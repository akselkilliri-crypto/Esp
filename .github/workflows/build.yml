name: Build ESP-IDF Deauth

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ESP-IDF (v5.1.2)
        run: |
          git clone --recursive -b v5.1.2 https://github.com/espressif/esp-idf.git
          cd esp-idf
          ./install.sh
          echo "IDF_PATH=$GITHUB_WORKSPACE/esp-idf" >> $GITHUB_ENV

      - name: Build firmware
        run: |
          source $IDF_PATH/export.sh
          idf.py set-target esp32
          idf.py build

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-deauth-firmware
          path: build/esp32-deauth.bin
